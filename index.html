<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedReminder - Lịch Nhắc Uống Thuốc</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body class="bg-soft-cyan">

    <nav class="navbar navbar-expand-lg navbar-dark bg-teal shadow">
        <div class="container">
            <a class="navbar-brand fw-bold fs-4" href="index.html">💊 MedReminder</a>
            <a href="admin.html" class="btn btn-light text-teal fw-bold shadow-sm">⚙️ Trang Quản Trị</a>
        </div>
    </nav>

    <div class="container my-5">
        <div class="card p-4 border-0 shadow-sm mb-4">
            <div class="row g-3 align-items-center">
                <div class="col-md-4">
                    <label class="form-label fw-bold text-secondary">Chọn Ngày Xem Lịch:</label>
                    <input type="date" id="filterDate" class="form-control">
                </div>
                <div class="col-md-5">
                    <label class="form-label fw-bold text-secondary">Tìm Tên Bệnh Nhân:</label>
                    <input type="text" id="searchPatient" class="form-control" placeholder="Nhập tên cần tìm...">
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-bold text-secondary">Trạng Thái:</label>
                    <select id="filterStatus" class="form-select">
                        <option value="all">Tất cả trạng thái</option>
                        <option value="taken">Đã uống thuốc</option>
                        <option value="pending">Chưa uống thuốc</option>
                    </select>
                </div>
            </div>
        </div>

        <h3 class="fw-bold mb-4 text-dark-blue" id="scheduleTitle">📅 Danh Sách Nhắc Nhở Hôm Nay</h3>

        <div id="loading" class="text-center my-5">
            <div class="spinner-border text-teal" role="status" style="width: 3rem; height: 3rem;"></div>
            <p class="mt-2 text-muted fw-semibold">Đang đồng bộ lịch trình y tế...</p>
        </div>

        <div class="row row-cols-1 row-cols-md-3 g-4" id="scheduleList" style="display: none;"></div>
    </div>

    <div class="row g-3 mb-4 text-center">
        <div class="col-6 col-md-3">
            <div class="p-3 bg-white border rounded shadow-sm">
                <h6 class="text-muted mb-1">📋 Tổng số lịch nhắc</h6>
                <h3 class="fw-bold text-primary mb-0" id="statTotal">0</h3>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="p-3 bg-light-success border border-success rounded shadow-sm">
                <h6 class="text-success mb-1">✓ Đã uống thuốc</h6>
                <h3 class="fw-bold text-success mb-0" id="statTaken">0</h3>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="p-3 bg-light-warning border border-warning rounded shadow-sm">
                <h6 class="text-warning mb-1">⏳ Chưa uống thuốc</h6>
                <h3 class="fw-bold text-warning mb-0" id="statPending">0</h3>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="p-3 bg-white border rounded shadow-sm">
                <h6 class="text-muted mb-1">📊 Tỷ lệ hoàn thành</h6>
                <h3 class="fw-bold text-dark mb-0" id="statRate">0%</h3>
            </div>
        </div>
    </div>
    <div class="toast-container position-fixed bottom-0 end-0 p-3"></div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
